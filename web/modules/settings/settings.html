<div class="settings-wrap">
  <div class="settings-header">
    <div class="settings-title">设置</div>
  </div>

  <!-- Tab 选择 -->
  <div class="config-tabs">
    <button class="tab-btn active" data-tab="model" onclick="switchTab('model')">模型</button>
    <button class="tab-btn" data-tab="mem0" onclick="switchTab('mem0')">mem0.json</button>
    <button class="tab-btn" data-tab="wiki" onclick="switchTab('wiki')">wiki.json</button>
  </div>

  <!-- Tab 内容 -->
  <div class="tab-content" id="tab-model">
    <div class="set-row">
      <div class="set-row-label">
        <div class="set-label">模型</div>
        <div class="set-desc" id="modelDesc">BAAI/bge-m3 · 向量维度 1024</div>
      </div>
      <select class="model-select" id="modelSelect">
        <option value="BAAI/bge-m3" selected>BAAI/bge-m3</option>
      </select>
    </div>

    <div class="set-row">
      <div class="set-row-label">
        <div class="set-label">推理设备</div>
        <div class="set-desc">选择模型推理使用的硬件</div>
      </div>
      <select class="device-select" id="deviceSelect" onchange="selectDevice(this.value)">
        <option value="auto">自动</option>
        <option value="gpu">GPU</option>
        <option value="cpu">CPU</option>
      </select>
    </div>

    <div class="gpu-info" id="gpuInfo">检测中...</div>

    <div class="header-actions">
      <button class="btn btn-secondary" id="resetBtn" onclick="resetSettings()">重置</button>
      <button class="btn btn-primary" id="saveBtn" onclick="applySettings()">保存</button>
    </div>
  </div>

  <div class="tab-content" id="tab-mem0" style="display:none">
    <div class="config-form" id="mem0Form"><div class="loading">加载中...</div></div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="resetMem0Config()">恢复默认</button>
      <button class="btn btn-primary" onclick="saveMem0Config()">保存</button>
    </div>
  </div>

  <div class="tab-content" id="tab-wiki" style="display:none">
    <div class="config-form" id="wikiForm"><div class="loading">加载中...</div></div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="resetWikiConfig()">恢复默认</button>
      <button class="btn btn-primary" onclick="saveWikiConfig()">保存</button>
    </div>
  </div>

</div>
