<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Manager</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: #1a1d27;
    border-bottom: 1px solid #2d3149;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo { font-size: 22px; }
  .header-title { font-size: 16px; font-weight: 600; color: #a78bfa; }
  .header-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: #64748b;
  }
  .settings-btn {
    background: #1e293b;
    border: 1px solid #2d3149;
    color: #94a3b8;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .settings-btn:hover { border-color: #7c3aed; color: #a78bfa; }

  /* Settings Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: #000a;
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #1a1d27;
    border: 1px solid #2d3149;
    border-radius: 14px;
    padding: 24px;
    width: 380px;
    box-shadow: 0 20px 60px #0008;
  }
  .modal-title {
    font-size: 15px;
    font-weight: 600;
    color: #e2e8f0;
    margin-bottom: 20px;
  }
  .setting-row {
    margin-bottom: 16px;
  }
  .setting-label {
    font-size: 12px;
    color: #64748b;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .06em;
    font-weight: 600;
  }
  .device-options {
    display: flex;
    gap: 8px;
  }
  .device-option {
    flex: 1;
    padding: 10px;
    border: 1px solid #2d3149;
    border-radius: 8px;
    background: #0f1117;
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    transition: all .2s;
  }
  .device-option:hover { border-color: #7c3aed44; }
  .device-option.selected { border-color: #7c3aed; background: #7c3aed22; color: #a78bfa; }
  .device-option .opt-icon { font-size: 20px; margin-bottom: 4px; }
  .device-option .opt-label { font-weight: 600; }
  .device-option .opt-desc { font-size: 11px; color: #64748b; margin-top: 2px; }
  .device-option.selected .opt-desc { color: #7c3aed88; }
  .gpu-info {
    margin-top: 8px;
    padding: 8px 12px;
    background: #0f1117;
    border: 1px solid #2d3149;
    border-radius: 6px;
    font-size: 12px;
    color: #64748b;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .btn-cancel {
    flex: 1;
    padding: 9px;
    background: #1e293b;
    border: 1px solid #2d3149;
    border-radius: 8px;
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-cancel:hover { border-color: #475569; }
  .btn-apply {
    flex: 2;
    padding: 9px;
    background: #7c3aed;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-apply:hover { opacity: .85; }
  .btn-apply:disabled { opacity: .4; cursor: not-allowed; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ef4444;
    transition: background .3s;
  }
  .status-dot.ready { background: #22c55e; }

  /* Layout */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    background: #1a1d27;
    border-right: 1px solid #2d3149;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 16px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #64748b;
    margin-bottom: 8px;
  }

  /* Store */
  .store-area textarea {
    width: 100%;
    background: #0f1117;
    border: 1px solid #2d3149;
    border-radius: 8px;
    color: #e2e8f0;
    padding: 10px 12px;
    font-size: 13px;
    resize: none;
    height: 80px;
    outline: none;
    transition: border-color .2s;
  }
  .store-area textarea:focus { border-color: #7c3aed; }
  .btn {
    width: 100%;
    margin-top: 8px;
    padding: 9px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: #7c3aed; color: #fff; }
  .btn-primary:hover { opacity: .85; }
  .btn-danger { background: #dc2626; color: #fff; margin-top: 4px; }
  .btn-danger:hover { opacity: .85; }

  /* Search */
  .search-area input {
    width: 100%;
    background: #0f1117;
    border: 1px solid #2d3149;
    border-radius: 8px;
    color: #e2e8f0;
    padding: 9px 12px;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  .search-area input:focus { border-color: #7c3aed; }

  /* Stats */
  .stats {
    background: #0f1117;
    border: 1px solid #2d3149;
    border-radius: 8px;
    padding: 12px;
    display: flex;
    justify-content: space-between;
  }
  .stat-item { text-align: center; }
  .stat-value { font-size: 20px; font-weight: 700; color: #a78bfa; }
  .stat-label { font-size: 11px; color: #64748b; margin-top: 2px; }

  /* Main content */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: #1a1d27;
    border-radius: 8px;
    padding: 4px;
  }
  .tab {
    flex: 1;
    padding: 7px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: #64748b;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .tab.active { background: #7c3aed; color: #fff; }

  /* Memory list */
  .memory-list { display: flex; flex-direction: column; gap: 8px; }
  .memory-card {
    background: #1a1d27;
    border: 1px solid #2d3149;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color .2s;
  }
  .memory-card:hover { border-color: #7c3aed44; }
  .memory-card.search-result { border-color: #7c3aed66; }
  .memory-content { flex: 1; min-width: 0; }
  .memory-text {
    font-size: 14px;
    color: #e2e8f0;
    line-height: 1.5;
    word-break: break-all;
  }
  .memory-meta {
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .memory-time { font-size: 11px; color: #64748b; }
  .memory-score {
    font-size: 11px;
    background: #7c3aed22;
    color: #a78bfa;
    padding: 1px 7px;
    border-radius: 99px;
    font-weight: 600;
  }
  .memory-id { font-size: 10px; color: #374151; font-family: monospace; }
  .del-btn {
    background: none;
    border: none;
    color: #374151;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color .2s, background .2s;
    flex-shrink: 0;
  }
  .del-btn:hover { color: #ef4444; background: #ef444420; }

  /* Empty */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: #1a1d27;
    border: 1px solid #2d3149;
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    box-shadow: 0 8px 32px #0008;
    opacity: 0;
    transform: translateY(12px);
    transition: all .3s;
    pointer-events: none;
    z-index: 999;
    max-width: 300px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: #22c55e44; color: #86efac; }
  .toast.error { border-color: #ef444444; color: #fca5a5; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2d3149; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <span class="header-logo">🧠</span>
  <span class="header-title">Memory Manager</span>
  <div class="header-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">检查连接...</span>
    <button class="settings-btn" onclick="openSettings()">⚙ 设置</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeSettings(event)">
  <div class="modal">
    <div class="modal-title">⚙ 运行设置</div>
    <div class="setting-row">
      <div class="setting-label">推理设备</div>
      <div class="device-options">
        <div class="device-option" id="optAuto" onclick="selectDevice('auto')">
          <div class="opt-icon">🔄</div>
          <div class="opt-label">自动</div>
          <div class="opt-desc">有GPU用GPU</div>
        </div>
        <div class="device-option" id="optGpu" onclick="selectDevice('gpu')">
          <div class="opt-icon">🎮</div>
          <div class="opt-label">GPU</div>
          <div class="opt-desc">速度更快</div>
        </div>
        <div class="device-option" id="optCpu" onclick="selectDevice('cpu')">
          <div class="opt-icon">💻</div>
          <div class="opt-label">CPU</div>
          <div class="opt-desc">兼容性好</div>
        </div>
      </div>
      <div class="gpu-info" id="gpuInfo">检测中...</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">取消</button>
      <button class="btn-apply" id="applyBtn" onclick="applySettings()">应用并重载模型</button>
    </div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <!-- Stats -->
    <div>
      <div class="section-title">统计</div>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="totalCount">-</div>
          <div class="stat-label">记忆总数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="todayCount">-</div>
          <div class="stat-label">今日新增</div>
        </div>
      </div>
    </div>

    <!-- Store -->
    <div class="store-area">
      <div class="section-title">添加记忆</div>
      <textarea id="storeInput" placeholder="输入要记住的内容..."></textarea>
      <button class="btn btn-primary" onclick="storeMemory()">💾 保存记忆</button>
    </div>

    <!-- Search -->
    <div class="search-area">
      <div class="section-title">语义搜索</div>
      <input id="searchInput" type="text" placeholder="搜索相关记忆..." oninput="debounceSearch()">
      <button class="btn btn-primary" style="margin-top:8px" onclick="searchMemory()">🔍 搜索</button>
    </div>

    <!-- Refresh -->
    <button class="btn" style="background:#1e293b;color:#94a3b8;margin-top:auto" onclick="loadAll()">↻ 刷新列表</button>
  </div>

  <div class="main">
    <div class="tab-bar">
      <button class="tab active" id="tabAll" onclick="switchTab('all')">全部记忆</button>
      <button class="tab" id="tabSearch" onclick="switchTab('search')">搜索结果</button>
    </div>
    <div class="memory-list" id="memoryList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://127.0.0.1:18765';
let allMemories = [];
let searchResults = [];
let currentTab = 'all';
let searchTimer = null;

// ── API calls ──────────────────────────────────────────────
async function api(path, data) {
  const r = await fetch(API + path, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  return r.json();
}

// ── Settings ───────────────────────────────────────────────
let currentDevice = 'cpu';
let pendingDevice = 'cpu';

async function openSettings() {
  // 拉取当前设置和硬件信息
  try {
    const [cfg, st] = await Promise.all([
      fetch(API + '/settings').then(r => r.json()),
      fetch(API + '/status').then(r => r.json()),
    ]);
    currentDevice = cfg.device || 'cpu';
    pendingDevice = currentDevice;
    selectDevice(currentDevice);

    const gpuEl = document.getElementById('gpuInfo');
    if (st.cuda_available) {
      gpuEl.innerHTML = `✅ 检测到 GPU：<strong>${st.gpu_name}</strong>`;
      gpuEl.style.color = '#86efac';
    } else {
      gpuEl.textContent = '❌ 未检测到 NVIDIA GPU，GPU 选项不可用';
      gpuEl.style.color = '#fca5a5';
      document.getElementById('optGpu').style.opacity = '0.4';
      document.getElementById('optGpu').style.pointerEvents = 'none';
    }
  } catch {}
  document.getElementById('modalOverlay').classList.add('show');
}

function closeSettings(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
}

function selectDevice(val) {
  pendingDevice = val;
  ['auto','gpu','cpu'].forEach(d => {
    document.getElementById('opt' + d.charAt(0).toUpperCase() + d.slice(1))
      .classList.toggle('selected', d === val);
  });
}

async function applySettings() {
  const btn = document.getElementById('applyBtn');
  btn.disabled = true;
  btn.textContent = '重载中...';
  try {
    await api('/reload-model', {device: pendingDevice});
    currentDevice = pendingDevice;
    document.getElementById('modalOverlay').classList.remove('show');
    toast(`🔄 模型重载中（${pendingDevice}），请稍候...`, 'success');
    _ready_flag = false;
    // 轮询等待模型就绪
    const poll = setInterval(async () => {
      try {
        const st = await fetch(API + '/status').then(r => r.json());
        updateStatusUI(st);
        if (st.model_loaded) { clearInterval(poll); toast('✅ 模型已就绪', 'success'); }
      } catch {}
    }, 2000);
  } catch(e) {
    toast('应用失败: ' + e, 'error');
  }
  btn.disabled = false;
  btn.textContent = '应用并重载模型';
}

// ── Status check ───────────────────────────────────────────
let _ready_flag = false;

function updateStatusUI(d) {
  document.getElementById('statusDot').className = 'status-dot' + (d.model_loaded ? ' ready' : '');
  const deviceLabel = d.device && d.device !== 'unknown' ? ` · ${d.device.toUpperCase()}` : '';
  document.getElementById('statusText').textContent = d.model_loaded ? `模型已就绪${deviceLabel}` : '模型加载中...';
}

async function checkStatus() {
  try {
    const d = await fetch(API + '/status').then(r => r.json());
    updateStatusUI(d);
    if (!d.model_loaded) setTimeout(checkStatus, 3000);
  } catch {
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = '未连接';
    setTimeout(checkStatus, 3000);
  }
}

// ── Store ──────────────────────────────────────────────────
async function storeMemory() {
  const text = document.getElementById('storeInput').value.trim();
  if (!text) return;
  try {
    const r = await api('/store', {text});
    if (r.error) { toast(r.error, 'error'); return; }
    toast('✅ ' + r.result, 'success');
    document.getElementById('storeInput').value = '';
    loadAll();
  } catch(e) { toast('连接失败', 'error'); }
}

// ── Search ─────────────────────────────────────────────────
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(searchMemory, 500);
}

async function searchMemory() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) { switchTab('all'); return; }
  try {
    const r = await api('/search', {query});
    searchResults = r.results || [];
    switchTab('search');
  } catch(e) { toast('搜索失败', 'error'); }
}

// ── List ───────────────────────────────────────────────────
async function loadAll() {
  try {
    const r = await api('/list', {});
    allMemories = r.memories || [];
    updateStats();
    if (currentTab === 'all') renderList(allMemories, false);
  } catch(e) { console.error(e); }
}

function updateStats() {
  document.getElementById('totalCount').textContent = allMemories.length;
  const today = new Date().toISOString().slice(0, 10);
  const cnt = allMemories.filter(m => (m.timestamp || '').startsWith(today)).length;
  document.getElementById('todayCount').textContent = cnt;
}

// ── Delete ─────────────────────────────────────────────────
async function deleteMemory(id) {
  try {
    const r = await api('/delete', {memory_id: id});
    if (r.error) { toast(r.error, 'error'); return; }
    toast('🗑️ ' + r.result, 'success');
    allMemories = allMemories.filter(m => m.id !== id);
    searchResults = searchResults.filter(m => m.id !== id);
    updateStats();
    renderList(currentTab === 'all' ? allMemories : searchResults, currentTab === 'search');
  } catch(e) { toast('删除失败', 'error'); }
}

// ── Render ─────────────────────────────────────────────────
function renderList(items, isSearch) {
  const el = document.getElementById('memoryList');
  if (!items.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">${isSearch ? '🔍' : '🧠'}</div>
      <div class="empty-text">${isSearch ? '没有找到相关记忆' : '还没有任何记忆'}</div>
    </div>`;
    return;
  }
  el.innerHTML = items.map(m => `
    <div class="memory-card ${isSearch ? 'search-result' : ''}">
      <div class="memory-content">
        <div class="memory-text">${escHtml(m.text)}</div>
        <div class="memory-meta">
          <span class="memory-time">🕐 ${formatTime(m.timestamp)}</span>
          ${m.score !== undefined ? `<span class="memory-score">相似度 ${(m.score*100).toFixed(1)}%</span>` : ''}
          <span class="memory-id">${(m.id||'').slice(0,8)}...</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteMemory('${m.id}')" title="删除">✕</button>
    </div>
  `).join('');
}

// ── Tab ────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabAll').className = 'tab' + (tab==='all'?' active':'');
  document.getElementById('tabSearch').className = 'tab' + (tab==='search'?' active':'');
  renderList(tab === 'all' ? allMemories : searchResults, tab === 'search');
}

// ── Utils ──────────────────────────────────────────────────
function formatTime(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); }
  catch { return ts.slice(0,16); }
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2800);
}

// Enter to store/search
document.getElementById('storeInput').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') storeMemory();
});
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchMemory();
});

// Init
checkStatus();
loadAll();
</script>
</body>
</html>
